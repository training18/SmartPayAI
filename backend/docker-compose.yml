version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: smartpay-postgres
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: smartpay
      POSTGRES_PASSWORD: smartpay
      POSTGRES_DB: smartpay
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: smartpay-redis
    restart: unless-stopped
    ports:
      - '6379:6379'

volumes:
  pgdata:
